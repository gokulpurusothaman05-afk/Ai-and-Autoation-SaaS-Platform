<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly - 404 Node Not Found</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- 1. Preloader Section -->
    <div id="preloader">
        <div class="loader-content">
            <div class="loader-logo"><img src="images/logo.webp" alt="Logo"> Stack<span>ly</span></div>
            <div class="loader-spinner"></div>
        </div>
    </div>

  

    <!-- 2. Error Section -->
    <section class="err-section">
        <div class="glow-dot" style="top: 20%; left: 30%; width: 400px; height: 400px;"></div>
        <div class="err-container">
            <h1>404</h1>
            <h2>Sandbox Node Not Found</h2>
            <p>The requested pipeline path is not mapped to an active environment. Ensure your variables coordinates are set correctly.</p>
            <a href="index.html" class="btn btn-primary"><i class="fa-solid fa-house" style="margin-right: 0.5rem;"></i> Return Home</a>
        </div>
    </section>

   
    <!-- Scripts -->
    <script src="js/main.js"></script>
</body>
</html>
